name: Deploy via FTP
on:
  push:
    branches:
      - main # Change this if your default branch is different (e.g., master)
jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v3

      - name: Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./ # Ensure this matches your cPanel path
          exclude: |
            **/.git*
            **/node_modules/**
            **/.env
            **/storage/**
            **/vendor/**
            **/tests/**
            **/phpunit.xml
            **/.editorconfig
            **/.gitattributes
            **/composer.json
            **/composer.lock
            **/package.json
            **/package-lock.json
            **/vite.config.js
